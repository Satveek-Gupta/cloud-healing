version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile   
    container_name: cloud-healing-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      # Add your env vars here, or use an .env file:
      # MONGO_URI: ${MONGO_URI}
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "5000:5000"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile  
      args:
        VITE_API_URL: http://backend:5000
    container_name: cloud-healing-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
